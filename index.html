<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>JORDAN ELITE HUB</title>
    <style>
        :root { --purple: #BC13FE; --cyan: #00F2EA; --dark: #05000A; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; text-align: center; }
        
        .header { margin-top: 30px; margin-bottom: 40px; }
        .header h1 { 
            font-size: 28px; font-weight: 900; letter-spacing: 3px;
            background: linear-gradient(to right, var(--purple), var(--cyan));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(188, 19, 254, 0.4);
        }

        /* Grid for App Launchers */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .card { 
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(188, 19, 254, 0.3);
            border-radius: 20px; padding: 20px; backdrop-filter: blur(10px);
            transition: 0.3s; cursor: pointer; display: flex; flex-direction: column; align-items: center;
        }
        .card:active { transform: scale(0.95); border-color: var(--cyan); box-shadow: 0 0 15px var(--cyan); }
        
        .icon { font-size: 35px; margin-bottom: 10px; }
        .card-label { font-size: 12px; font-weight: bold; color: #888; text-transform: uppercase; }

        .status-bar { 
            margin-top: 40px; background: #000; padding: 15px; border-radius: 50px; 
            border: 1px solid #222; font-size: 12px; color: var(--cyan);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>ELITE SYSTEM v1.0</h1>
        <p style="color: #444; font-size: 10px;">AUTHORIZED ACCESS ONLY: JORDAN</p>
    </div>

    <div class="grid">
        <div class="card" onclick="location.href='tracker.html'">
            <div class="icon">📍</div>
            <span class="card-label">Family Tracker</span>
        </div>
        <div class="card" onclick="location.href='vpn.html'">
            <div class="icon">🛡️</div>
            <span class="card-label">Jordan VPN</span>
        </div>
        <div class="card" onclick="location.href='archiver.html'">
            <div class="icon">📂</div>
            <span class="card-label">File Manager</span>
        </div>
        <div class="card" onclick="location.href='gen.html'">
            <div class="icon">📧</div>
            <span class="card-label">Vulcan Gen</span>
        </div>
    </div>

    <div class="status-bar" id="status">
        SYSTEM ENCRYPTED: 128-BIT AES ACTIVE
    </div>

    <script>
        // Simple logic to show a "Heartbeat" animation
        setInterval(() => {
            const status = document.getElementById('status');
            status.style.opacity = status.style.opacity == '0.5' ? '1' : '0.5';
        }, 1000);
    </script>
</body>
</html>
